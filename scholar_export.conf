[search]
# One raw Google Scholar query string. Keep AND/OR/quotes exactly as you want them searched.
keywords = """
("Underwater Robotics" OR "Marine Robotics" OR "AUV" OR "ROV" OR "Subsea Robotics")
AND
("Artificial Intelligence" OR "Autonomous Navigation" OR "SLAM" OR "Sensor Fusion" OR "Digital Twin")
AND
("Marine Monitoring" OR "Ocean Observation" OR "Underwater Inspection" OR "Ocean Exploration" OR "Marine Ecosystems")
"""

start_year = 2021
end_year = 2026

output = exports/publications_2021_2026.bib
txt = false
max_results = 10

# Be gentle with Google Scholar. Increase this if requests get blocked.
delay = 1.0

# false is faster; true asks scholarly for fuller publication metadata.
fill_publications = false

patents = false
citations = false
sort_by = relevance

# Global socket timeout (seconds) used by scholarly/selenium network calls.
# Increase on slow networks or if webdriver startup is slow on Windows.
network_timeout = 30
